services:
  app:
    build: .
    container_name: node-ts-movie
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    command: pnpm dev
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: db_sandbox
      DRIZZLE_DB_HOST: postgres
      DRIZZLE_DB_PORT: 5432
      DRIZZLE_DB_USER: postgres
      DRIZZLE_DB_PASSWORD: postgres
      DRIZZLE_DB_NAME: db_sandbox
      PORT: 3001

  postgres:
    image: postgres:17-alpine
    container_name: db-postgres-movie
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db
      SANDBOX_DB_NAME: db_sandbox
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

volumes:
  pg_data:
